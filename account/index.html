<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: *; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://gquytiqzeckptjttpaum.supabase.co;">
    <title>VESTRA | Account</title>
    <link rel="stylesheet" href="/shared/app-shell.css">
    <style>
        .account-hero {
            gap: 20px;
            padding-block: clamp(32px, 6vw, 52px);
        }

        .account-hero-top,
        .account-hero-actions,
        .account-grid-actions,
        .asset-actions,
        .empty-state-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .account-hero-top {
            justify-content: space-between;
        }

        .account-hero h1 {
            max-width: 12ch;
        }

        .account-email-chip,
        .status-badge {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 0 14px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .account-email-chip {
            border: 1px solid var(--vestra-line);
            background: var(--vestra-surface);
            color: var(--vestra-muted);
            max-width: min(100%, 360px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .account-overview {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
            gap: 16px;
            align-items: stretch;
        }

        .overview-card,
        .results-shell,
        .empty-state-card,
        .asset-card {
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: linear-gradient(180deg, rgba(246, 246, 244, 0.5), #fff 28%);
            box-shadow: var(--vestra-shadow);
        }

        .overview-card,
        .results-shell,
        .empty-state-card {
            padding: clamp(22px, 3vw, 30px);
        }

        .overview-card {
            display: grid;
            gap: 12px;
        }

        .overview-card h2,
        .results-header h2,
        .empty-state-card h2 {
            font-size: clamp(24px, 3vw, 34px);
            line-height: 1.02;
            letter-spacing: -1.3px;
            font-weight: 600;
        }

        .access-stack {
            display: grid;
            gap: 12px;
        }

        .access-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 14px 0;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .access-row:first-child {
            padding-top: 0;
            border-top: 0;
        }

        .access-copy {
            display: grid;
            gap: 4px;
        }

        .access-copy strong {
            font-size: 14px;
            font-weight: 600;
        }

        .access-copy span {
            font-size: 13px;
            color: var(--vestra-muted);
        }

        .results-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 18px;
            align-items: stretch;
        }

        .asset-card {
            overflow: hidden;
        }

        .asset-thumb {
            aspect-ratio: 4 / 5;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 32%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.03), rgba(0, 0, 0, 0)),
                var(--vestra-surface);
            position: relative;
        }

        .asset-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .asset-thumb::after {
            content: attr(data-overlay);
            position: absolute;
            left: 16px;
            bottom: 16px;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 0, 0, 0.08);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: #111;
        }

        .asset-body {
            display: grid;
            gap: 16px;
            padding: 18px 18px 20px;
        }

        .asset-heading {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .asset-title {
            display: grid;
            gap: 6px;
        }

        .asset-title h3 {
            font-size: 18px;
            line-height: 1.08;
            letter-spacing: -0.5px;
            font-weight: 600;
        }

        .status-badge {
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: #fff;
            color: #111;
        }

        .status-badge.is-preview {
            background: rgba(246, 246, 244, 0.9);
        }

        .status-badge.is-locked {
            background: rgba(0, 0, 0, 0.04);
        }

        .status-badge.is-unlocked {
            background: #111;
            color: #fff;
            border-color: #111;
        }

        .asset-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 12px;
            color: var(--vestra-muted);
        }

        .asset-actions a,
        .asset-actions button {
            flex: 1 1 160px;
        }

        .asset-actions .app-button-ghost[disabled] {
            opacity: 0.45;
            cursor: default;
        }

        .empty-state-card {
            display: none;
            gap: 16px;
        }

        .empty-state-card.is-visible {
            display: grid;
        }

        .results-shell.is-hidden {
            display: none;
        }

        /* Generation mode toggle */
        .generation-mode {
            display: block;
            margin-top: 18px;
        }
        .mode-toggle {
            display: inline-flex;
            border-radius: 999px;
            background: transparent;
            gap: 8px;
            box-shadow: none;
        }
        .mode-toggle .mode-btn {
            border: 1px solid rgba(0,0,0,0.06);
            background: #fff;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            border-radius: 999px;
            cursor: pointer;
            color: var(--vestra-muted);
        }
        .mode-toggle .mode-btn.is-active {
            background: #111;
            color: #fff;
            border-color: rgba(0,0,0,0.12);
        }
        .generation-mode .mode-meta { color: var(--vestra-soft); font-size: 12px; }

        .route-note {
            font-size: 12px;
            color: var(--vestra-soft);
        }

        .projects-section {
            width: calc(100vw - 48px);
            max-width: none;
            margin-inline: calc(50% - 50vw + 24px);
        }

        .projects-section {
            padding: 0 24px 48px;
        }

        .projects-range-label {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.2px;
            color: #353535;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            align-items: stretch;
        }

        .project-card {
            aspect-ratio: 3 / 4;
            min-width: 0;
            padding: 24px;
            border: 1px solid var(--vestra-line);
            border-radius: 16px;
            background: #fff;
            box-shadow: none;
            display: grid;
            align-content: space-between;
            gap: 18px;
        }

        .project-card-top {
            display: grid;
            gap: 14px;
            min-width: 0;
        }

        .project-card-title {
            font-size: 24px;
            line-height: 1.05;
            letter-spacing: -0.8px;
            font-weight: 600;
        }

        .project-card-foot {
            font-size: 12px;
            color: var(--vestra-soft);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            .account-overview {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 760px) {
            .account-hero-top,
            .asset-heading,
            .asset-meta,
            .access-row {
                align-items: flex-start;
                flex-direction: column;
            }

            .asset-actions a,
            .asset-actions button {
                width: 100%;
            }
        }

        .app-main {
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="app-shell" data-app-shell>
        <main class="app-main">
            <section class="projects-section">
                <div class="projects-grid" data-projects-grid></div>
            </section>
        </main>
    </div>

    <script>
        const MOCK_PROJECTS = [
            'Spring Editorial Set',
            'Studio Basics',
            'Marketplace Batch',
            'Resort Launch',
            'Denim Core Update',
            'Holiday Selects',
            'Essentials Retouch',
            'Campaign Review',
            'Lookbook Drop 01',
            'Studio Retake Set',
            'Marketplace Refresh',
            'Outerwear Batch'
        ];

        window.VESTRA_APP_PAGE = {
            routeKey: 'account',
            allowAuthParams: true
        };

        function renderProjects(projects) {
            const grid = document.querySelector('[data-projects-grid]');
            if (!grid) return;

            grid.innerHTML = '';

            const fragment = document.createDocumentFragment();

            projects.forEach((projectName) => {
                const card = document.createElement('article');
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="project-card-top">
                        <h2 class="project-card-title">${projectName}</h2>
                    </div>
                    <div class="project-card-foot">Project</div>
                `;
                fragment.appendChild(card);
            });

            grid.appendChild(fragment);
        }

        renderProjects(MOCK_PROJECTS);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/shared/app-shell.js"></script>
</body>
</html>
